name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-app:
    if: startsWith(github.head_ref, 'dev/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            cppcheck \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          cppcheck --version
          arm-none-eabi-gcc --version
          arm-none-eabi-objdump --version

      - name: Configure debug
        run: cmake --preset debug

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=constParameterPointer:platform/lpc43xx/lpc_chip_43xx/inc/* \
            -D__GNUC__ \
            -DCORE_M4 \
            -Isrc \
            -Isrc/Driver \
            -Iplatform/lpc43xx/lpc_chip_43xx/inc \
            src/main.c \
            src/sysinit.c \
            src/hmi \
            src/Driver \
            --quiet

      - name: Build app debug
        run: cmake --build --preset debug --target cursada_mc2_app

      - name: Configure release
        run: cmake --preset release

      - name: Build app release
        run: cmake --build --preset release --target cursada_mc2_app

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cursada_mc2_app-debug
          path: |
            build/debug/cursada_mc2_app.elf
            build/debug/cursada_mc2_app.bin
            build/debug/cursada_mc2_app.hex
            build/debug/cursada_mc2_app.map
          if-no-files-found: error

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cursada_mc2_app-release
          path: |
            build/release/cursada_mc2_app.elf
            build/release/cursada_mc2_app.bin
            build/release/cursada_mc2_app.hex
            build/release/cursada_mc2_app.map
          if-no-files-found: error
